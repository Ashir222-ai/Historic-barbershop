<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historic Barbershop — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #47c2c4;
    --teal-dark: #2fa0a2;
    --dark: #1a1a1a;
    --dark2: #2c2c2c;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --muted: #888;
    --border: #333;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(71,194,196,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  .brand {
    text-align: center;
    margin-bottom: 16px;
  }
  .barber-pole {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .pole-line {
    height: 2px;
    width: 40px;
    background: linear-gradient(90deg, transparent, var(--teal));
  }
  .pole-line.right {
    background: linear-gradient(90deg, var(--teal), transparent);
  }
  .pole-icon { font-size: 1.4rem; }
  .brand-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--cream);
    letter-spacing: 0.06em;
  }
  .brand-title span { color: var(--teal); }
  .brand-sub {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .chat-card {
    background: var(--dark2);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(71,194,196,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 560px;
  }

  .chat-header {
    background: linear-gradient(135deg, #111 0%, #1e1e1e 100%);
    border-bottom: 1px solid rgba(71,194,196,0.2);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    border: 2px solid rgba(71,194,196,0.3);
    flex-shrink: 0;
  }
  .chat-header-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .online-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.68rem; color: #6dbf6d; margin-top: 2px;
    font-weight: 300;
  }
  .online-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #6dbf6d;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .msg { display: flex; flex-direction: column; max-width: 84%; animation: msgIn 0.25s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 0.875rem;
    line-height: 1.55;
    font-weight: 300;
  }
  .msg.bot .bubble {
    background: #333;
    color: var(--cream);
    border: 1px solid #444;
    border-bottom-left-radius: 3px;
  }
  .msg.user .bubble {
    background: var(--teal);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg-time { font-size: 0.62rem; color: #555; margin-top: 4px; padding: 0 2px; }
  .msg.user .msg-time { text-align: right; }

  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 7px;
    padding: 0 14px 10px;
  }
  .qr-btn {
    background: transparent;
    border: 1px solid rgba(71,194,196,0.4);
    color: var(--teal);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.76rem;
    cursor: pointer;
    transition: all 0.16s;
    font-weight: 400;
  }
  .qr-btn:hover { background: var(--teal); color: #fff; border-color: var(--teal); }

  .input-area {
    padding: 12px 13px;
    border-top: 1px solid var(--border);
    display: flex; gap: 9px; align-items: center;
    background: #222;
  }
  .msg-input {
    flex: 1;
    border: 1px solid #444;
    border-radius: 20px;
    padding: 9px 15px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.875rem;
    color: var(--cream);
    background: #333;
    outline: none;
    transition: border-color 0.16s;
    font-weight: 300;
  }
  .msg-input::placeholder { color: #666; }
  .msg-input:focus { border-color: var(--teal); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--teal);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.16s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal-dark); transform: scale(1.07); }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 10px 13px;
    background: #333;
    border: 1px solid #444;
    border-radius: 14px;
    border-bottom-left-radius: 3px;
    width: fit-content;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #666; animation: bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .footer-note {
    text-align: center; margin-top: 12px;
    font-size: 0.65rem; color: #555; letter-spacing: 0.08em;
  }
  .footer-note b { color: var(--teal); font-weight: 500; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="barber-pole">
      <div class="pole-line"></div>
      <div class="pole-icon">✂️</div>
      <div class="pole-line right"></div>
    </div>
    <div class="brand-title">Historic <span>Barbershop</span></div>
    <div class="brand-sub">Centralia, WA · AI Assistant</div>
  </div>

  <div class="chat-card">
    <div class="chat-header">
      <div class="avatar">✂️</div>
      <div>
        <div class="chat-header-name">Shop Assistant</div>
        <div class="online-badge"><span class="online-dot"></span> Ready to help</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="quick-replies" id="quickReplies"></div>

    <div class="input-area">
      <input class="msg-input" id="msgInput" type="text" placeholder="Ask about services, pricing, booking…" />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="footer-note">Powered by <b>Claude AI</b> · Demo for Historic Barbershop</div>
</div>

<script>
const SYSTEM = `You are a friendly, knowledgeable assistant for Historic Barbershop in Centralia, WA. Your name is "The Chair" — keep it fun and barbershop-themed but professional.

SERVICES & PRICES:
- Haircut: $37 (30 min) — personalized consultation, expert cut, blow dry & style with premium products
- Haircut w/ Gil (owner): $42 (30 min) — premium cut by owner Gil Hernandez, includes luxury hot towel neck shave
- Senior Haircut (62+): $27 (30 min) — classic cut & style, complimentary hot lather neck shave with straight razor
- Kids Haircut: $35 (30 min) — consultation, cut, blow dry & style tailored to your child
- Beard with Hot Towel: $33 (30 min) — luxury hot towel beard treatment
- Haircut & Beard Combo: $65 (60 min) — cut + trim + straight razor edging + hot towel + blow dry + aftershave, lotion & beard balm

BARBERS: Gil Hernandez (owner), Olivia O'Quinn, Edwin Camacho, Sheri Karl, Anthony Camacho De Jesus

HOURS:
- Mon, Tue, Sat: 8:00 AM – 5:00 PM
- Wed, Thu, Fri: 10:00 AM – 7:00 PM
- Sunday: CLOSED

ADDRESS: 105 W Main St, Centralia, WA 98531
PHONE: (360) 623-2217
EMAIL: historicbarbershop@gmail.com
BOOKING: https://square.site/book/L9F7JT3G6T9W3/historic-barbershop-centralia-wa
FACEBOOK: facebook.com/historicbarbershopcentralia
INSTAGRAM: @historicbarbershop

CANCELLATION POLICY:
- Minimum 6 hours notice required to cancel or reschedule
- No-shows and late cancellations: $25 fee before next appointment
- 10+ minutes late may result in rescheduling

RULES:
- Keep replies SHORT (2–4 sentences). Friendly, confident barbershop tone.
- Always direct booking to their Square link or phone number.
- If asked about a specific barber, mention them by name.
- Sales tax of 6.5% applies to some services.`;

const quickOptions = ["Services & prices", "Book an appointment", "Hours & location", "Meet the barbers", "Cancellation policy"];
const history = [];

function getTime() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

function addMessage(text, role) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

function renderQuickReplies(show) {
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  if (!show) return;
  quickOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn'; btn.textContent = opt;
    btn.onclick = () => sendMessage(opt);
    qr.appendChild(btn);
  });
}

async function sendMessage(override) {
  const input = document.getElementById('msgInput');
  const text = override || input.value.trim();
  if (!text) return;
  input.value = '';
  renderQuickReplies(false);
  addMessage(text, 'user');
  history.push({role:'user', content:text});
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, try again!";
    hideTyping();
    history.push({role:'assistant', content:reply});
    addMessage(reply, 'bot');
  } catch(e) {
    hideTyping();
    addMessage("Something went wrong. Please call us at (360) 623-2217!", 'bot');
  }
}

document.getElementById('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });

window.onload = () => {
  const greeting = "Hey there! 👋 Welcome to <b>Historic Barbershop</b> in Centralia, WA. I can help with services, pricing, booking, and hours. What can I do for you?";
  addMessage(greeting, 'bot');
  history.push({role:'assistant', content:"Hey there! Welcome to Historic Barbershop in Centralia, WA. I can help with services, pricing, booking, and hours. What can I do for you?"});
  renderQuickReplies(true);
};
</script>
</body>
</html>
